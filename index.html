<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Biologia Infantil</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TELA INICIO -->
    <section id="telaInicio" class="ativa-flex">
        <button onclick="irPara('telaAvatar')">Start Game</button>
    </section>

    <!-- AVATAR -->
    <section id="telaAvatar">
        <h2>Escolha seu avatar</h2>
        <button onclick="irPara('telaOpcoes')">Confirmar</button>
    </section>

    <!-- MENU -->
    <section id="telaOpcoes">
        <button onclick="irPara('telaTemas')">Jogar</button>
    </section>

    <!-- TEMAS -->
    <section id="telaTemas">
        <button onclick="iniciarJogo('ecologia')">Ecologia</button>
    </section>

    <!-- JOGO -->
    <section id="telaJogo">
        <h2 id="textoPergunta"></h2>
        <div id="containerOpcoes"></div>
    </section>

    <script src="data/perguntas.js"></script>
    <script src="script.js"></script>

</body>
</html>
